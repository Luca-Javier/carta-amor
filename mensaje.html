<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Árbol creciendo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: rgb(107, 84, 66);
      scroll-behavior: none;
    }

    svg {
      width: 400px;
      overflow: visible;
    }

    .branch {
      fill: none;
      stroke: rgb(216, 168, 131);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;

      stroke-dasharray: 500;
      stroke-dashoffset: 500;

      animation: grow 4s linear forwards;
    }

    .b1 {
      animation-delay: 0s;
    }

    .b2 {
      animation-delay: 0.6s;
    }

    .b3 {
      animation-delay: 1.1s;
    }

    .b4 {
      animation-delay: 1.6s;
    }

    .b5 {
      animation-delay: 2.1s;
    }

    .b6 {
      animation-delay: 2.5s;
    }

    .b7 {
      animation-delay: 2.9s;
    }

    @keyframes grow {
      to {
        stroke-dashoffset: 0;
      }
    }


    svg.container {
      position: relative;
    }




    .heart {
      position: absolute;
      transform-origin: center;



    }







    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;


    }

    p,
    h1 {
      color: #000;
      text-align: center;
    }

    @keyframes title {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-family: 'Playfair Display', serif !important;
      opacity: 0;
      transform: translateY(-25px);
      animation: title 1.2s ease forwards;
      font-size: 52px;
    }

    @keyframes typing {
      0% {
        opacity: 0;
      }

      to {
        opacity: 1;

      }
    }



    p {
      font-family: "Cormorant Garamond", sans-serif;
      overflow: hidden;
      white-space: nowrap;
      width: 0;

      animation:
        typing 2s steps(13, end) forwards;

      font-size: 32px;
      width: 100%;
      overflow-wrap: break-word;
      max-width: 80vw;
      white-space: normal;
      opacity: 0;
    }

    p+p {
      animation:
        typing 2s steps(13, end) 3s forwards;


    }

    .btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      gap: 8px;
      font-weight: bold;

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }














    /* Card */
    .card {
      transform: scale(0.6);

      border-radius: 18px;
      background: transparent;
      position: absolute;
      left: 15px;
      bottom: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      display: flex;
    }

    .card p {
      margin: 0;
      animation: none;
      opacity: 1;
    }

    /* textura sutil */


    /* contenido */
    .title {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      letter-spacing: 0.2px;
      display: flex;
      gap: 6px;
      justify-content: start;
      align-items: start;
      margin-left: 12px;
      flex-direction: column;
    }

    .card img {
      width: 70px;
      height: 70px;
      border-radius: 100%;
      overflow: hidden;
      object-fit: cover;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      color: #181818;
    }
  </style>
</head>

<body>


  <h1>AGUS</h1>

  <div
    style="overflow: hidden;display: flex; flex-direction: column;align-items: center;justify-content: center; width: 80vw;">


    <p>
      Estaba pensando en vos y quería recordarte que te aprecio mucho y que sos una persona muy especial para mí.



    </p>
    <p>

      !por eso te dedico este arbolito para vos¡
    </p>
  </div>


  <svg viewBox="0 0 400 400" class="container">

    <!-- Tronco -->
    <path class="branch b1" d="M200 380 L200 250" />

    <!-- Rama izquierda -->
    <path class="branch b2" d="M200 290 L165 240" />

    <!-- Rama derecha -->
    <path class="branch b3" d="M200 270 L240 215" />

    <!-- Rama secundaria -->
    <path class="branch b4" d="M165 240 L145 190" />

    <!-- Rama secundaria -->
    <path class="branch b5" d="M165 240 L185 180" />

    <!-- Rama secundaria -->
    <path class="branch b6" d="M240 215 L260 170" />

    <!-- Rama secundaria -->
    <path class="branch b7" d="M240 215 L290 190" />

  </svg>




  <button class="btn">


    Compartir


    <img src="./share.svg" fill="#ff8" width="20"></>


  </button>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const $container = document.querySelector('svg');

    const name = window.location.search.split('=');

    document.querySelector("h1").innerText = decodeURIComponent(name[1]).toUpperCase();



    setTimeout(() => createLeafs(6, 1), 2000);
    setTimeout(() => createLeafs(20, 0.8), 3000);
    setTimeout(() => createLeafs(30, 0.4), 4000);
    setTimeout(() => createLeafs(30, 0.2), 7000);
    setTimeout(() => createLeafs(300, 0.02), 9000);



    const random = (min, max) => Math.random() * (max - min) + min;
    async function createLeafs(leafs, speed) {

      for (let i = 0; i < leafs; i++) {
        const $leaf = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        $leaf.setAttribute('d', "M12 21s-8-5.4-8-11a4.5 4.5 0 018-2.8A4.5 4.5 0 0120 10c0 5.6-8 11-8 11z");
        $leaf.classList.add('heart');


        const size = random(18, 50);
        const y = random(100, 300);
        const x = random(50, 350);
        const flies = Math.random() < 0.2;


        $leaf.setAttribute("transform", `translate(${x}, ${y < 300 ? y : 200})`)






        $leaf.setAttribute('fill', `hsl(${Math.random() * 360}, 70%, 50%)`);
        $container.appendChild($leaf);
        await new Promise(resolve => setTimeout(resolve, speed * 1000));

      }
    }


    const btn = document.querySelector('.btn');

    setTimeout(() => {
      btn.style.opacity = 1;
      btn.style.pointerEvents = 'auto';
    }, 6000);

    btn.addEventListener('click', () => {
      document.querySelectorAll("p").forEach(p => { p.style.opacity = 1, p.style.animation = "none" });
      document.querySelector("h1").style.opacity = 1;
      document.querySelector("h1").style.animation = "none";



      const $node = document.querySelector('body');

      $node.append($socials);
      btn.style.display = 'none';

      html2canvas($node).then(canvas => {
        const link = document.createElement('a');
        link.download = 'arbolito.png';
        link.href = canvas.toDataURL();
        btn.style.display = 'flex';
        link.click();
        $node.removeChild($socials);
      });
    });



    const $socials = document.createElement('div');
    $socials.innerHTML = `<div class="card">
      <img src="./yo.png" />
  <div class="title">
    <p>
      Lucode44
      </p>
      <div class="subtitle">Link en mi bio</div>
    </div>
</div>`



  </script>
</body>

</html>
